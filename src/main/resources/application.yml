spring:
  datasource:
    url: jdbc:h2:mem:nfeprocessor;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driverClassName: org.h2.Driver
    username: sa
    password: sa
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
  devtools:
    restart:
      enabled: false
  task:
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 100

server:
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health

ocr:
  enabled: false
  tessdata-path: /usr/share/tessdata
  fallback:
    emitter-cnpj: 27865757000102
    recipient-tax-id: 12345678909

sefaz:
  stub:
    enabled: true
