spring:
  datasource:
    url: jdbc:h2:mem:nfeprocessor;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driverClassName: org.h2.Driver
    username: sa
    password: sa
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
  devtools:
    restart:
      enabled: false

server:
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health

ocr:
  enabled: false

sefaz:
  stub:
    enabled: true