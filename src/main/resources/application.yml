spring:
  datasource:
    url: jdbc:h2:mem:nfeprocessor;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driverClassName: org.h2.Driver
    username: sa
    password: sa
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
  devtools:
    restart:
      enabled: false
  task:
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 100

server:
  error:
    include-message: never

ocr:
  enabled: false
  tessdata-path: /usr/share/tessdata
  confidence-threshold: 75

sefaz:
  stub:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      sefazClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

# BuildToFlip v6 Configuration
logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"nfe-processor","traceId":"%X{traceId}","spanId":"%X{spanId}","class":"%logger{36}","message":"%msg"}%n'
  level:
    root: INFO
    br.com.nfe: DEBUG
    org.springframework.web.filter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: nfe-processor
      environment: ${ENVIRONMENT:dev}

# Feature Flags v6
features:
  mock-data-enabled: ${FEATURE_MOCK_DATA:true}
  rate-limit-enabled: ${FEATURE_RATE_LIMIT:true}
  cache-enabled: ${FEATURE_CACHE:true}
  ocr:
    enabled: ${OCR_ENABLED:false}
  sefaz:
    stub:
      enabled: ${SEFAZ_STUB_ENABLED:true}
