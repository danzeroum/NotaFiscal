<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFe Processor - Dashboard v6</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div id="mockIndicator" class="mock-indicator" style="display: none;">
        ⚠️ Modo Mock Data Ativo
    </div>

    <header>
        <h1>NFe Processor - BuildToFlip v6</h1>
        <div class="trace-info">
            TraceId: <span id="traceId">-</span>
        </div>
    </header>

    <main>
        <section class="upload-section">
            <h2>Upload de NFe</h2>
            <div class="upload-area" id="uploadArea">
                <p>Arraste arquivo ZIP aqui ou clique para selecionar</p>
                <input type="file" id="fileInput" accept=".zip" style="display: none;">
            </div>
            <button id="uploadBtn" class="btn btn-primary" disabled>Enviar</button>
        </section>

        <section class="batches-section">
            <h2>Lotes Processados</h2>
            <div id="batchesList" class="batches-list"></div>
            <div class="pagination">
                <button id="prevPage">Anterior</button>
                <span id="pageInfo">Página 1</span>
                <button id="nextPage">Próxima</button>
            </div>
        </section>

        <section class="metrics-section">
            <h2>Métricas</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>Total Processado</h3>
                    <p id="totalProcessed">0</p>
                </div>
                <div class="metric-card">
                    <h3>Taxa de Sucesso</h3>
                    <p id="successRate">0%</p>
                </div>
                <div class="metric-card">
                    <h3>P95 Latência</h3>
                    <p id="p95Latency">0ms</p>
                </div>
                <div class="metric-card">
                    <h3>Status</h3>
                    <p id="healthStatus">🟢 OK</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>BuildToFlip v6 - Disciplina mínima, valor máximo</p>
    </footer>

    <script src="/js/dashboard.js"></script>
</body>
</html>
